<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Buyurtma</title>
<link rel="stylesheet" href="rahat.css">
</head>
<body class="order">

<header class="navbar">
<div class="logo">RAHAT METBEX</div>
<nav>
<a href="index.html">Bosh sahifa</a>
<a href="menu.html">Menu</a>
<a href="order.html" class="active">Buyurtmalar</a>
</nav>
</header>

<section class="order-page">
<div class="order-box">
<h1>Buyurtma Qilish</h1>
<form id="orderForm">
<input type="text" placeholder="Ismingiz" required>
<input type="tel" placeholder="Telefon" required>
<select required>
<option value="">Ovqat tanlang</option>
<option value="Osh">Osh</option>
<option value="Lagman">Lagman</option>
<option value="Salat">Salat</option>
<option value="Belyashi">Belyashi</option>
<option value="Burger">Burger</option>
</select>
<input type="number" placeholder="Nechta" min="1" required>
<button>Buyurtma berish</button>
</form>
</div>
</section>

<script>
const form = document.getElementById("orderForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const ism = form.querySelector('input[type="text"]').value.trim();
    const telefon = form.querySelector('input[type="tel"]').value.trim();
    const ovqat = form.querySelector('select').value;
    const soni = form.querySelector('input[type="number"]').value;

    if(!ism || !telefon || !ovqat || !soni) return;

    // oldingi buyurtmalarni olish
    let buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];

    // yangi buyurtma
    const id = Date.now(); // unikal ID
    buyurtmalar.push({id, ism, telefon, ovqat, soni});

    // localStorage ga saqlash
    localStorage.setItem("buyurtmalar", JSON.stringify(buyurtmalar));

    alert("Buyurtma qabul qilindi!");

    form.reset();
});
</script>

</body>
</html>
